name: CI

on:
  push:
    branches:
      - master
      - "002.5-*"
      - "00[0-9]-*"
  pull_request:
    branches:
      - master

# Least-privilege default: all jobs get read-only access unless explicitly overridden.
# (Fixes CodeQL rule actions/missing-workflow-permissions)
permissions:
  contents: read

# ─── Job: lint ────────────────────────────────────────────────────────────────
# Runs ESLint on Node 20 only — linting is not Node-version sensitive
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

# ─── Job: test ────────────────────────────────────────────────────────────────
# Runs the full test suite with coverage on Node 20 and 22 (FR-006).
# Node 18 dropped: jsdom 29's @exodus/bytes dep requires Node ^20.19 || ^22.12.
# Coverage artifacts are uploaded for consumption by the coverage-comment job.
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        # Required: src/modules/shared/db/index.ts opens data/neurodesk.db at module load.
        # Any test that transitively imports the DB singleton (RAG integration tests,
        # retrieval-service, chunker) otherwise crashes with
        # "Cannot open database because the directory does not exist".
        run: mkdir -p data

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

# ─── Job: build ───────────────────────────────────────────────────────────────
# Verifies production build AND type-checks the codebase (FR-005).
# Runs after tests pass to avoid wasting build minutes on a broken test run.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        run: mkdir -p data

      - name: Next.js production build
        run: npm run build

      - name: TypeScript type check
        # Runs in addition to the build — catches type errors in test and non-compiled files
        run: npx tsc --noEmit

# ─── Job: coverage-comment ────────────────────────────────────────────────────
# Posts a coverage summary as a PR comment using the Node 20 coverage report.
# Only runs on pull_request events (not on push to master).
  coverage-comment:
    name: Coverage Comment
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact (Node 20)
        uses: actions/download-artifact@v8
        with:
          name: coverage-20
          path: coverage/

      - name: Post coverage report as PR comment
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
